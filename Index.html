<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein KI Agent</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: #2ed573;
            margin-bottom: 20px;
        }

        #antwort-box {
            width: 100%;
            max-width: 400px;
            min-height: 150px;
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
            border: 1px solid #333;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        input {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            background-color: #2ed573;
            border: none;
            border-radius: 8px;
            color: #121212;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>KI Agent</h1>
    
    <div id="antwort-box">Schreibe etwas und drücke auf Senden...</div>
    
    <form id="ki-form" onsubmit="sendeAnfrage(event)">
        <input type="text" id="frage-input" placeholder="Frag deinen Agenten..." required>
        <button type="submit" id="sende-btn">An KI senden</button>
    </form>

    <script>
        // TRAGE HIER DEINEN AKTUELLEN GROQ-KEY EIN
        const API_KEY = "DEIN_NEUER_GROQ_KEY_HIER";

        const frageInput = document.getElementById('frage-input');
        const antwortBox = document.getElementById('antwort-box');

        async function sendeAnfrage(event) {
            event.preventDefault(); 
            
            const frage = frageInput.value;
            if(!frage) return;

            antwortBox.innerText = "KI überlegt...";
            frageInput.value = ""; 

            try {
                // Direkte, blitzschnelle Verbindung zu Groq
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", 
                        messages: [
                            { role: "system", content: "Du bist ein hilfreicher KI-Agent. Antworte kurz auf Deutsch." },
                            { role: "user", content: frage }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error("Fehler-Code: " + response.status);
                }

                const daten = await response.json();
                antwortBox.innerText = daten.choices[0].message.content;

            } catch (fehler) {
                console.error(fehler);
                antwortBox.innerText = "Fehler: " + fehler.message;
            }
        }
    </script>

</body>
</html>
